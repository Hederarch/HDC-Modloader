<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Hyperspace Deck Command: Wishgranter</title>
    <link href="mod_menu.css" rel="stylesheet" type="text/css" media="all" />
    <style id="font"></style>
    <script src="dist/renderer/modMenu/loadingBar.js"></script>
    <script src="dist/renderer/modMenu/modEntry.js" type="module"></script>
    <script src="dist/renderer/modMenu/modMenu.js" type="module"></script>
    <script type="importmap">
      {
        "imports": {
          "wishgranter": "./dist/exports.js"
        }
      }
    </script>
  </head>
  <body>
    <template>
      <div><img class="icon" /></div>
      <h2 class="name"></h2>
      <p class="version"></p>
      <p class="description"></p>
      <button class="move_up">↑</button>
      <button class="move_down">↓</button>
    </template>
    <div mod_menu id="modlist"></div>
    <div mod_menu>
      <img id="hyperspace_box_art" />
    </div>
    <label mod_menu for="hyperspace_file_location_input"
      >Hyperspace Deck Command Installation:</label
    >
    <input mod_menu type="text" id="hyperspace_file_location_input" />
    <button mod_menu class="steam_button"><img src="steam.svg" /></button>
    <button
      mod_menu
      class="file_location_button"
      for="hyperspace_file_location_input"
    >
      <img src="folder.svg" />
    </button>
    <label mod_menu for="mods_file_location_input">Mods folder:</label>
    <input mod_menu type="text" id="mods_file_location_input" />
    <button
      mod_menu
      class="file_location_button"
      for="mods_file_location_input"
    >
      <img src="folder.svg" />
    </button>
    <button mod_menu id="start_game_button" disabled>Start Game</button>
    <loading-bar mod_menu id="loading_bar"></loading-bar>
  </body>
</html>
